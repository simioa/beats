- name: process_state
  type: group
  description: >
    `process_state` contains metrics for the checked processes running on the host.
  release: ga
  fields:
    - name: process
      type: group
      description: >
        Process Metrics for the checked Process
      fields:
        - name: name
          type: keyword
          description: >
            The process name that matches the regex
        - name: command_line
          type: keyword
          description: >
            The full command-line of the process that matches the regex
          ignore_above: 2048
    - name: procString
      type: keyword
      description: >
        The regex provided to search for
    - name: alias
      type: keyword
      description: >
        The Alias to easily identify the checked Process
    - name: running
      type: boolean
      description: >
        Boolean indicating if the checked Process is running
